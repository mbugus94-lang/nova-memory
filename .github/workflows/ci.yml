name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint with ruff
        run: ruff check . --select E,F,W --ignore E501
      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Type check with mypy
        run: mypy core/ api/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests
        env:
          ENVIRONMENT: development
          NOVA_SECRET_KEY: ci-test-secret-key-12345
          DATABASE_PATH: /tmp/test_nova_ci.db
        run: |
          python -m pytest tests/ -v --tb=short --cov=core --cov=api --cov-report=term-missing
      - name: Run existing test suite
        env:
          ENVIRONMENT: development
          NOVA_SECRET_KEY: ci-test-secret-key-12345
        run: |
          python tests/test_nova_memory.py

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t nova-memory:test .
      - name: Verify container starts
        run: |
          docker run -d --name test-container \
            -e ENVIRONMENT=development \
            -e NOVA_SECRET_KEY=test-key \
            -p 8000:8000 \
            nova-memory:test
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container
