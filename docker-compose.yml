version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nova-memory
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - NOVA_SECRET_KEY=${NOVA_SECRET_KEY}
      - NOVA_MEMORY_DB_PATH=/app/data/nova_memory.db
      - NOVA_ADMIN_PASSWORD=${NOVA_ADMIN_PASSWORD}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
